name: Diagnose Auth User

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username to diagnose'
        required: true
        default: 'wilson'
        type: string
      password:
        description: 'Password to test (no se imprime ni guarda)'
        required: true
        default: 'admin123'
        type: string
      confirm_diagnose:
        description: 'Confirmar diagnóstico (debe ser "true")'
        required: true
        default: 'false'
        type: string

permissions:
  id-token: write
  contents: read

env:
  DATA_SOURCE: dynamodb
  DYNAMODB_REGION: us-east-1
  DYNAMODB_TABLE_PREFIX: portafolio-production
  ALLOW_AUTH_DIAGNOSE: 'true'
  AUTH_DIAGNOSE_USERNAME: ${{ inputs.username }}
  AUTH_DIAGNOSE_PASSWORD: ${{ inputs.password }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}

jobs:
  diagnose:
    if: ${{ inputs.confirm_diagnose == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::383000882391:role/github-actions-deploy-role
          aws-region: us-east-1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm --prefix apps/backend ci

      - name: Run auth diagnose
        run: npm --prefix apps/backend run diagnose:auth-user

      - name: Diagnóstico completado
        run: echo "✅ Diagnóstico finalizado. No se modificaron datos."
