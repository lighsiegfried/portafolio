name: Repair Demo Users Passwords

on:
  workflow_dispatch:
    inputs:
      confirm_repair:
        description: 'Confirm repair of demo user password hashes in DynamoDB'
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  repair-demo-users:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm_repair == 'true' }}

    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::383000882391:role/github-actions-deploy-role
          aws-region: us-east-1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        run: npm --prefix apps/backend ci

      - name: Repair demo users password hashes
        run: npm --prefix apps/backend run repair:demo-users
        env:
          DATA_SOURCE: dynamodb
          DYNAMODB_REGION: us-east-1
          DYNAMODB_TABLE_PREFIX: portafolio-production
          ALLOW_USER_REPAIR: 'true'
          NODE_ENV: production
