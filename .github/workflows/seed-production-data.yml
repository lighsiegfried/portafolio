name: Seed Production Data

on:
  workflow_dispatch:
    inputs:
      reset_data:
        description: "Reset existing data before seeding (NOT recommended — deletes existing records)"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::383000882391:role/github-actions-deploy-role
  NODE_VERSION: "24.16.0"

jobs:
  seed:
    name: Seed DynamoDB with Demo Data
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        run: npm --prefix apps/backend ci

      - name: Validate seed data
        run: npm --prefix apps/backend run seed:validate

      - name: Seed DynamoDB
        run: npm --prefix apps/backend run seed
        env:
          DATA_SOURCE: dynamodb
          DYNAMODB_REGION: us-east-1
          DYNAMODB_TABLE_PREFIX: portafolio-production
          ALLOW_DYNAMODB_SEED: "true"
          NODE_ENV: production
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: 24h

      - name: Verify seed
        run: |
          echo "## Seed Production Data" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Demo data seeded to DynamoDB successfully." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Table | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Users | Seeded (wilson, compras1, bodega1, gerencia1) |" >> $GITHUB_STEP_SUMMARY
          echo "| Products | Seeded (12 products) |" >> $GITHUB_STEP_SUMMARY
          echo "| Requisitions | Seeded (10 requisitions) |" >> $GITHUB_STEP_SUMMARY
          echo "| Inventory Movements | Seeded (20 movements) |" >> $GITHUB_STEP_SUMMARY
          echo "| Leads | Seeded (10 leads) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Login: wilson / admin1234" >> $GITHUB_STEP_SUMMARY
