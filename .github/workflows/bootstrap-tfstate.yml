name: Bootstrap Terraform State Bucket

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm creating the S3 state bucket'
        required: true
        default: ''

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::383000882391:role/github-actions-deploy-role
  TF_STATE_BUCKET: portafolio-production-tfstate-383000882391

jobs:
  bootstrap:
    name: Create Terraform State Bucket
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        shell: bash
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "yes" ]; then
            echo "❌ Confirmation required. Type \"yes\" in the confirm field to proceed."
            exit 1
          fi
          echo "✅ Confirmation received. Proceeding..."

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Confirm caller identity
        shell: bash
        run: |
          echo "## Caller Identity" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          aws sts get-caller-identity >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check if bucket already exists
        id: check_bucket
        shell: bash
        continue-on-error: true
        run: |
          aws s3api head-bucket --bucket ${{ env.TF_STATE_BUCKET }} --region ${{ env.AWS_REGION }}

      - name: Create bucket
        if: steps.check_bucket.outcome == 'failure'
        shell: bash
        run: |
          echo "📦 Creating bucket: ${{ env.TF_STATE_BUCKET }}"
          # us-east-1 does NOT use LocationConstraint
          aws s3api create-bucket \
            --bucket ${{ env.TF_STATE_BUCKET }} \
            --region ${{ env.AWS_REGION }}
          echo "✅ Bucket created successfully"

      - name: Bucket already exists
        if: steps.check_bucket.outcome != 'failure'
        shell: bash
        run: |
          echo "✅ Bucket ${{ env.TF_STATE_BUCKET }} already exists — skipping creation"

      - name: Enable Block Public Access
        shell: bash
        run: |
          aws s3api put-public-access-block \
            --bucket ${{ env.TF_STATE_BUCKET }} \
            --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

      - name: Enable Bucket Versioning
        shell: bash
        run: |
          aws s3api put-bucket-versioning \
            --bucket ${{ env.TF_STATE_BUCKET }} \
            --versioning-configuration Status=Enabled

      - name: Enable SSE-S3 Encryption
        shell: bash
        run: |
          aws s3api put-bucket-encryption \
            --bucket ${{ env.TF_STATE_BUCKET }} \
            --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

      - name: Set Bucket Ownership Controls (BucketOwnerEnforced)
        shell: bash
        run: |
          aws s3api put-bucket-ownership-controls \
            --bucket ${{ env.TF_STATE_BUCKET }} \
            --ownership-controls \
              '{"Rules":[{"ObjectOwnership":"BucketOwnerEnforced"}]}'

      - name: Tag bucket
        shell: bash
        run: |
          aws s3api put-bucket-tagging \
            --bucket ${{ env.TF_STATE_BUCKET }} \
            --tagging \
              '{"TagSet":[
                {"Key":"Project","Value":"Portafolio Mini ERP"},
                {"Key":"Environment","Value":"production"},
                {"Key":"ManagedBy","Value":"GitHubActions"},
                {"Key":"Purpose","Value":"TerraformState"}
              ]}'

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## ✅ Bootstrap Summary"
            echo ""
            echo "| Item | Status |"
            echo "|------|--------|"
            echo "| **Bucket** | ${{ env.TF_STATE_BUCKET }} |"
            echo "| **Region** | ${{ env.AWS_REGION }} |"
            echo "| **Block Public Access** | ✅ Enabled |"
            echo "| **Versioning** | ✅ Enabled |"
            echo "| **SSE-S3 Encryption** | ✅ Enabled |"
            echo "| **BucketOwnerEnforced** | ✅ Enabled |"
            echo "| **Tags** | ✅ Applied |"
            echo ""
            echo "### Next steps"
            echo ""
            echo "1. Copy the backend config:"
            echo '```bash'
            echo "cp infra/terraform/backend.tf.example infra/terraform/backend.tf"
            echo '```'
            echo ""
            echo "2. Initialize Terraform with remote state:"
            echo '```bash'
            echo "cd infra/terraform && terraform init"
            echo '```'
            echo ""
            echo "3. Verify state is now remote:"
            echo '```bash'
            echo "terraform state list"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
