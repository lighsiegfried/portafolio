name: Smoke Test Production

on:
  workflow_dispatch:
    inputs:
      run_contact_test:
        description: "Also test POST /contact (sends email)"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "24.16.0"
  API_URL: ${{ vars.VITE_API_BASE_URL_PRODUCTION || 'https://2t1wxsttb5.execute-api.us-east-1.amazonaws.com' }}

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Smoke Test — GET /health
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.API_URL }}/health")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ /health OK (200)"
          else
            echo "❌ /health returned $HTTP_CODE"
            curl -s "${{ env.API_URL }}/health"
            exit 1
          fi

      - name: Smoke Test — Login
        id: login
        run: |
          echo "🔐 Logging in as wilson..."
          LOGIN_RESPONSE=$(curl -s -X POST "${{ env.API_URL }}/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"username":"wilson","password":"admin123"}')
          TOKEN=$(echo "$LOGIN_RESPONSE" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const r=JSON.parse(d);if(r.ok&&r.data.token){console.log(r.data.token)}else{console.error('Login failed:',JSON.stringify(r));process.exit(1)}}catch(e){console.error('Parse error:',e.message);process.exit(1)}})")
          echo "TOKEN=$TOKEN" >> $GITHUB_OUTPUT
          echo "✅ Login OK"

      - name: Smoke Test — GET /dashboard/summary
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.login.outputs.TOKEN }}" \
            "${{ env.API_URL }}/dashboard/summary" \
            | grep -q 200 && echo "✅ /dashboard/summary OK" || (echo "❌ /dashboard/summary failed" && exit 1)

      - name: Smoke Test — GET /requisitions
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.login.outputs.TOKEN }}" \
            "${{ env.API_URL }}/requisitions?limit=50" \
            | grep -q 200 && echo "✅ /requisitions OK" || (echo "❌ /requisitions failed" && exit 1)

      - name: Smoke Test — GET /products
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.login.outputs.TOKEN }}" \
            "${{ env.API_URL }}/products" \
            | grep -q 200 && echo "✅ /products OK" || (echo "❌ /products failed" && exit 1)

      - name: Smoke Test — GET /inventory/movements
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.login.outputs.TOKEN }}" \
            "${{ env.API_URL }}/inventory/movements" \
            | grep -q 200 && echo "✅ /inventory/movements OK" || (echo "❌ /inventory/movements failed" && exit 1)

      - name: Smoke Test — GET /inventory/low-stock
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.login.outputs.TOKEN }}" \
            "${{ env.API_URL }}/inventory/low-stock" \
            | grep -q 200 && echo "✅ /inventory/low-stock OK" || (echo "❌ /inventory/low-stock failed" && exit 1)

      - name: Smoke Test — GET /leads
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.login.outputs.TOKEN }}" \
            "${{ env.API_URL }}/leads" \
            | grep -q 200 && echo "✅ /leads OK" || (echo "❌ /leads failed" && exit 1)

      - name: Smoke Test — POST /contact (optional)
        if: ${{ inputs.run_contact_test == 'true' }}
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ env.API_URL }}/contact" \
            -H "Content-Type: application/json" \
            -d '{"name":"Smoke Test","email":"smoke@test.local","message":"Smoke test automated message — ignore"}')
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ /contact OK (200)"
          else
            echo "⚠️  /contact returned $HTTP_CODE (non-critical)"
          fi

      - name: Smoke Test Summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ Todos los endpoints responden OK"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Smoke Test Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All production endpoints responded successfully." >> $GITHUB_STEP_SUMMARY
