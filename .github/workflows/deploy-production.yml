name: 🚀 Deploy Production

on:
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: "BACKEND: Apply Terraform changes for Lambda/API Gateway/DynamoDB"
        type: boolean
        default: false
      deploy_frontend:
        description: "FRONTEND: Build and upload React app to S3 + invalidate CloudFront"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::383000882391:role/github-actions-deploy-role
  TF_STATE_BUCKET: portafolio-production-tfstate-383000882391
  TF_STATE_KEY: production/terraform.tfstate
  FRONTEND_BUCKET: wilsonvasquezcvaws
  CLOUDFRONT_DISTRIBUTION_ID: EZKTZCIB8U4LY
  CLOUDFRONT_DOMAIN: dxxrwydm6m8sc.cloudfront.net
  NODE_VERSION: "24.16.0"
  TF_VERSION: "1.15.5"

jobs:
  validate-and-build:
    name: Validate, Test & Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            apps/backend/package-lock.json
            apps/frontend/package-lock.json

      - name: Backend npm ci
        run: npm --prefix apps/backend ci

      - name: Backend tests
        run: npm --prefix apps/backend test

      - name: Build Lambda zip
        run: npm --prefix apps/backend run build

      - name: Upload Lambda zip
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: apps/backend/dist/lambda.zip
          retention-days: 1

      - name: Frontend npm ci
        run: npm --prefix apps/frontend ci

  terraform-plan:
    name: Backend Terraform Plan
    needs: [validate-and-build]
    runs-on: ubuntu-latest
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate required secrets and variables
        shell: bash
        run: |
          if [ -z "${{ secrets.JWT_SECRET }}" ]; then
            echo "❌ Missing required secret: JWT_SECRET"
            exit 1
          fi
          if [ -z "${{ vars.CONTACT_TO_EMAIL }}" ]; then
            echo "❌ Missing required variable: CONTACT_TO_EMAIL"
            exit 1
          fi
          if [ -z "${{ vars.CONTACT_FROM_EMAIL }}" ]; then
            echo "❌ Missing required variable: CONTACT_FROM_EMAIL"
            exit 1
          fi
          if [ -z "${{ vars.SES_REGION }}" ]; then
            echo "❌ Missing required variable: SES_REGION"
            exit 1
          fi
          if [ -z "${{ vars.CONTACT_REPLY_TO_ENABLED }}" ]; then
            echo "❌ Missing required variable: CONTACT_REPLY_TO_ENABLED"
            exit 1
          fi
          if [ -z "${{ vars.SEND_CONTACT_CONFIRMATION }}" ]; then
            echo "❌ Missing required variable: SEND_CONTACT_CONFIRMATION"
            exit 1
          fi
          if [ -z "${{ vars.VITE_API_BASE_URL_PRODUCTION }}" ]; then
            echo "⚠️  VITE_API_BASE_URL_PRODUCTION not set (needed for frontend deploy)"
          fi
          echo "✅ All required secrets and variables are configured"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create backend.tf for remote state
        run: |
          cat > infra/terraform/backend.tf << 'EOF'
          terraform {
            backend "s3" {
              bucket  = "${{ env.TF_STATE_BUCKET }}"
              key     = "${{ env.TF_STATE_KEY }}"
              region  = "${{ env.AWS_REGION }}"
              encrypt = true
            }
          }
          EOF

      - name: Download Lambda zip
        uses: actions/download-artifact@v4
        with:
          name: lambda-zip
          path: apps/backend/dist

      - name: Terraform init (upgrade to bypass expired key)
        run: terraform init -upgrade -input=false
        working-directory: infra/terraform

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: infra/terraform

      - name: Terraform validate
        run: terraform validate
        working-directory: infra/terraform

      - name: Terraform plan
        id: plan
        shell: bash
        run: |
          set +e -o pipefail
          terraform plan \
            -input=false \
            -var="project_name=portafolio" \
            -var="environment=production" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="create_frontend_bucket=false" \
            -var="manage_cloudfront=false" \
            -var="existing_frontend_bucket_name=${{ env.FRONTEND_BUCKET }}" \
            -var="existing_cloudfront_distribution_id=${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" \
            -var="existing_cloudfront_domain=${{ env.CLOUDFRONT_DOMAIN }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="contact_to_email=${{ vars.CONTACT_TO_EMAIL }}" \
            -var="contact_from_email=${{ vars.CONTACT_FROM_EMAIL }}" \
            -var="contact_reply_to_enabled=${{ vars.CONTACT_REPLY_TO_ENABLED || 'true' }}" \
            -var="send_contact_confirmation=${{ vars.SEND_CONTACT_CONFIRMATION || 'false' }}" \
            -var="ses_region=${{ vars.SES_REGION || 'us-east-1' }}" \
            -var="allowed_origins=https://${{ env.CLOUDFRONT_DOMAIN }},http://localhost:5173" \
            -var="enable_point_in_time_recovery=false" \
            -no-color \
            2>&1 | tee plan-output.txt
          PLAN_EXITCODE=${PIPESTATUS[0]}
          echo "exitcode=$PLAN_EXITCODE" >> $GITHUB_OUTPUT
          if [ "$PLAN_EXITCODE" -eq 2 ]; then
            echo "✅ Plan shows changes (exit code 2) — approved for apply"
          elif [ "$PLAN_EXITCODE" -ne 0 ]; then
            echo "❌ Plan failed with exit code $PLAN_EXITCODE"
            exit $PLAN_EXITCODE
          fi
        working-directory: infra/terraform

      - name: Show plan summary
        run: |
          PLAN_OUTPUT="infra/terraform/plan-output.txt"
          echo "## Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "$PLAN_OUTPUT" ]; then
            grep -E "^(Plan:|No changes.|Changes to:)" "$PLAN_OUTPUT" >> $GITHUB_STEP_SUMMARY || true
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -20 "$PLAN_OUTPUT" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ plan-output.txt was not generated." >> $GITHUB_STEP_SUMMARY
            echo "Terraform plan likely failed before output was captured." >> $GITHUB_STEP_SUMMARY
            echo "Check the 'Terraform plan' step logs for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Clean up backend.tf (prevent local drift)
        if: always()
        run: |
          rm -f infra/terraform/backend.tf
          rm -f infra/terraform/plan-output.txt

  terraform-apply:
    name: Backend Terraform Apply
    needs: [terraform-plan]
    if: github.event.inputs.deploy_backend == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate required secrets and variables
        shell: bash
        run: |
          if [ -z "${{ secrets.JWT_SECRET }}" ]; then
            echo "❌ Missing required secret: JWT_SECRET"
            exit 1
          fi
          if [ -z "${{ vars.CONTACT_TO_EMAIL }}" ]; then
            echo "❌ Missing required variable: CONTACT_TO_EMAIL"
            exit 1
          fi
          if [ -z "${{ vars.CONTACT_FROM_EMAIL }}" ]; then
            echo "❌ Missing required variable: CONTACT_FROM_EMAIL"
            exit 1
          fi
          if [ -z "${{ vars.SES_REGION }}" ]; then
            echo "❌ Missing required variable: SES_REGION"
            exit 1
          fi
          if [ -z "${{ vars.CONTACT_REPLY_TO_ENABLED }}" ]; then
            echo "❌ Missing required variable: CONTACT_REPLY_TO_ENABLED"
            exit 1
          fi
          if [ -z "${{ vars.SEND_CONTACT_CONFIRMATION }}" ]; then
            echo "❌ Missing required variable: SEND_CONTACT_CONFIRMATION"
            exit 1
          fi
          echo "✅ All required secrets and variables are configured"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Create backend.tf for remote state
        run: |
          cat > infra/terraform/backend.tf << 'EOF'
          terraform {
            backend "s3" {
              bucket  = "${{ env.TF_STATE_BUCKET }}"
              key     = "${{ env.TF_STATE_KEY }}"
              region  = "${{ env.AWS_REGION }}"
              encrypt = true
            }
          }
          EOF

      - name: Download Lambda zip
        uses: actions/download-artifact@v4
        with:
          name: lambda-zip
          path: apps/backend/dist

      - name: Terraform init (upgrade to bypass expired key)
        run: terraform init -upgrade -input=false
        working-directory: infra/terraform

      - name: Terraform apply
        id: apply
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            -var="project_name=portafolio" \
            -var="environment=production" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="create_frontend_bucket=false" \
            -var="manage_cloudfront=false" \
            -var="existing_frontend_bucket_name=${{ env.FRONTEND_BUCKET }}" \
            -var="existing_cloudfront_distribution_id=${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" \
            -var="existing_cloudfront_domain=${{ env.CLOUDFRONT_DOMAIN }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="contact_to_email=${{ vars.CONTACT_TO_EMAIL }}" \
            -var="contact_from_email=${{ vars.CONTACT_FROM_EMAIL }}" \
            -var="contact_reply_to_enabled=${{ vars.CONTACT_REPLY_TO_ENABLED || 'true' }}" \
            -var="send_contact_confirmation=${{ vars.SEND_CONTACT_CONFIRMATION || 'false' }}" \
            -var="ses_region=${{ vars.SES_REGION || 'us-east-1' }}" \
            -var="allowed_origins=https://${{ env.CLOUDFRONT_DOMAIN }},http://localhost:5173" \
            -var="enable_point_in_time_recovery=false" \
            -no-color \
            2>&1 | tee apply-output.txt
        working-directory: infra/terraform

      - name: Save API Gateway URL
        id: save_api_url
        run: |
          API_URL=$(terraform output -raw api_gateway_url 2>/dev/null || echo "not_available")
          echo "API_GATEWAY_URL=$API_URL" >> $GITHUB_ENV
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
        working-directory: infra/terraform

      - name: Smoke test API Gateway
        id: smoke_test
        run: |
          API_URL="${{ steps.save_api_url.outputs.api_url }}"
          echo "Testing API Gateway at: ${API_URL}"
          echo "api_url=${API_URL}" >> $GITHUB_OUTPUT

          # Test /health endpoint
          HEALTH_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/health")
          if [ "$HEALTH_RESPONSE" = "200" ]; then
            echo "✅ /health endpoint returns 200"
          else
            echo "❌ /health endpoint returned ${HEALTH_RESPONSE}"
            curl -s "${API_URL}/health"
            echo ""
          fi

          # Test /api/health (for frontend proxy path)
          API_HEALTH_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/api/health")
          if [ "$API_HEALTH_RESPONSE" = "200" ]; then
            echo "✅ /api/health endpoint returns 200"
          else
            echo "❌ /api/health endpoint returned ${API_HEALTH_RESPONSE}"
            curl -s "${API_URL}/api/health"
            echo ""
          fi

      - name: Show apply summary
        run: |
          echo "## ✅ Terraform Apply Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Output | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **API Gateway URL** | \`${{ steps.save_api_url.outputs.api_url }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Health Check** | \`${{ steps.smoke_test.outputs.api_url }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Post-apply" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Set the GitHub variable \`VITE_API_BASE_URL_PRODUCTION\` to the API Gateway URL above." >> $GITHUB_STEP_SUMMARY
          echo "2. Run the \`Seed Production Data\` workflow to populate DynamoDB." >> $GITHUB_STEP_SUMMARY
          echo "3. Run this workflow with \`deploy_frontend=true\` to update the frontend." >> $GITHUB_STEP_SUMMARY

      - name: Clean up backend.tf
        if: always()
        run: |
          rm -f infra/terraform/backend.tf
          rm -f infra/terraform/apply-output.txt

  deploy-frontend:
    name: Frontend Build + S3/CloudFront Deploy
    needs: [validate-and-build]
    if: github.event.inputs.deploy_frontend == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Set production API URL
        id: set_api_url
        run: |
          API_URL="${{ vars.VITE_API_BASE_URL_PRODUCTION }}"
          if [ -z "$API_URL" ]; then
            echo "❌ VITE_API_BASE_URL_PRODUCTION not set"
            echo "Set it in GitHub → Settings → Secrets and variables → Actions → Variables"
            exit 1
          fi
          if echo "$API_URL" | grep -q "localhost"; then
            echo "❌ VITE_API_BASE_URL_PRODUCTION cannot be localhost in production"
            exit 1
          fi
          echo "VITE_API_BASE_URL=$API_URL" >> $GITHUB_ENV
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "✅ Using production API URL: $API_URL"

      - name: Frontend npm ci
        run: npm --prefix apps/frontend ci

      - name: Validate frontend env
        shell: bash
        run: |
          API_URL="${{ steps.set_api_url.outputs.api_url }}"
          if [ -z "$API_URL" ]; then
            echo "❌ Missing GitHub variable: VITE_API_BASE_URL_PRODUCTION"
            exit 1
          fi
          if echo "$API_URL" | grep -q "localhost"; then
            echo "❌ VITE_API_BASE_URL cannot be localhost in production"
            exit 1
          fi
          echo "✅ Using API base URL: $API_URL"

      - name: Frontend build
        run: npm --prefix apps/frontend run build
        env:
          VITE_API_BASE_URL: ${{ steps.set_api_url.outputs.api_url }}
          VITE_DEMO_MODE: "false"

      - name: Sync to S3
        run: |
          aws s3 sync apps/frontend/dist s3://${{ env.FRONTEND_BUCKET }} --delete

      - name: CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Show deploy summary
        run: |
          echo "## ✅ Frontend Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Detail |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **S3 Bucket** | \`${{ env.FRONTEND_BUCKET }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **CloudFront ID** | \`${{ env.CLOUDFRONT_DISTRIBUTION_ID }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **CloudFront URL** | https://${{ env.CLOUDFRONT_DOMAIN }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **API Base** | ${{ env.VITE_API_BASE_URL || '(not set)' }} |" >> $GITHUB_STEP_SUMMARY
